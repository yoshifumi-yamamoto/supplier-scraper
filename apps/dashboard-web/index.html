<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supplier Scraper Dashboard</title>
  <style>
    :root { --bg:#f6f7f9; --fg:#0f1720; --card:#ffffff; --accent:#0a7a5a; }
    body { margin:0; font-family: "Segoe UI", sans-serif; background:linear-gradient(180deg,#f6f7f9,#e8edf2); color:var(--fg); }
    .wrap { max-width: 980px; margin: 32px auto; padding: 0 16px; }
    .card { background:var(--card); border-radius:14px; padding:20px; box-shadow: 0 8px 24px rgba(15,23,32,.08); }
    h1 { margin:0 0 12px; font-size:28px; }
    .pill { display:inline-block; background:#e8fff6; color:var(--accent); padding:6px 10px; border-radius:999px; font-weight:600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Supplier Scraper Dashboard</h1>
      <p><span class="pill">MVP Scaffold</span></p>
      <p>Overview / Runs / Errors は API連携で段階実装します。</p>
    </div>
  </div>
</body>
</html>
