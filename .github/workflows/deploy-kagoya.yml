name: Deploy To KAGOYA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KAGOYA_SSH_PRIVATE_KEY }}

      - name: Add KAGOYA to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.KAGOYA_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to KAGOYA
        env:
          KAGOYA_HOST: ${{ secrets.KAGOYA_HOST }}
          KAGOYA_USER: ${{ secrets.KAGOYA_USER }}
          KAGOYA_APP_DIR: ${{ secrets.KAGOYA_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.venv/' \
            --exclude '.env' \
            --exclude 'output/' \
            --exclude 'jobs/' \
            --exclude 'node_modules/' \
            --exclude '.DS_Store' \
            ./ "${KAGOYA_USER}@${KAGOYA_HOST}:${KAGOYA_APP_DIR}/"

      - name: Finalize deploy on KAGOYA
        env:
          KAGOYA_HOST: ${{ secrets.KAGOYA_HOST }}
          KAGOYA_USER: ${{ secrets.KAGOYA_USER }}
          KAGOYA_APP_DIR: ${{ secrets.KAGOYA_APP_DIR }}
        run: |
          ssh "${KAGOYA_USER}@${KAGOYA_HOST}" \
            "export KAGOYA_APP_DIR='${KAGOYA_APP_DIR}' && bash -s" \
            < scripts/deploy_kagoya.sh
